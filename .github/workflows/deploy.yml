name: Deploy

# Push to main builds the web image on GitHub's runners (no laptop, no 2 GB VPS
# build limit), pushes it to Docker Hub, then SSHes into the VPS to pull + restart.
# Trigger manually from the Actions tab with "Run workflow" if you ever need to.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race; a newer push cancels an in-flight one.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The Docker Hub repo for the web image, e.g. yudyack/portofolio-web.
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/portofolio-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # :latest is what the VPS .env points at; the SHA tag is for rollback.
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Reuse layers across runs so unchanged builds finish in seconds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on the VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Path to the repo checkout on the VPS (holds docker-compose.prod.yml + .env).
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
